function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function pad(n) { return n.toString().padStart(2, "0"); }

function toMinutes(t) {
  if (!t) return 0;
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
function grossHours(start, end) {
  let s = toMinutes(start), e = toMinutes(end);
  if (e <= s) e += 24 * 60;
  return (e - s) / 60;
}
function netHours(start, end, pauseMin) {
  const g = grossHours(start, end);
  return Math.max(0, g - (pauseMin || 0) / 60);
}
function fmtHM(h) {
  if (h == null || isNaN(h)) return "—";
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return `${hh}h${mm > 0 ? pad(mm) : "00"}`;
}
function fmtCHF(v) {
  return new Intl.NumberFormat("de-CH", { style: "currency", currency: "CHF" }).format(v || 0);
}
function fmtEUR(v) {
  return new Intl.NumberFormat("it-IT", { style: "currency", currency: "EUR" }).format(v || 0);
}
function fmtDateLong(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("it-IT", { weekday: "short", day: "2-digit", month: "short", year: "numeric" });
}
function todayISO() {
  const t = new Date();
  return `${t.getFullYear()}-${pad(t.getMonth() + 1)}-${pad(t.getDate())}`;
}

function emptyEntry() {
  return {
    id: uid(),

    tipo: "Vigilanza",
    start: "08:00",
    end: "12:00",
    pausaMin: 0,
    rate: 25,
    indennita: 0,
    note: "",
    photos: [],
  };
}

function compressImageFile(file, maxDim = MAX_PHOTO_DIM, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

/* ----------------------------------------------------------------
   Persistenza locale (localStorage — l'app è standalone su iPhone)
------------------------------------------------------------------*/
function lsGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw != null ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function lsSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) { return false; }
}

function App() {
  const [entries, setEntries] = useState(() => lsGet(STORAGE_KEY, []));
  const [sites, setSites] = useState(() => lsGet(SITES_KEY, []));
  const [fxRate, setFxRate] = useState(() => lsGet(RATE_KEY, DEFAULT_RATE));
  const [saveState, setSaveState] = useState("idle");
  const [editing, setEditing] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [pdfBusy, setPdfBusy] = useState(false);
  const [rateInput, setRateInput] = useState(String(lsGet(RATE_KEY, DEFAULT_RATE)));
  const [rateEditorOpen, setRateEditorOpen] = useState(false);
  const [shareSheet, setShareSheet] = useState(null);
  const [lightbox, setLightbox] = useState(null);

  const persist = useCallback((next) => {
    setSaveState("saving");
    const ok = lsSet(STORAGE_KEY, next);
    setSaveState(ok ? "saved" : "error");
    setTimeout(() => setSaveState("idle"), 1100);
  }, []);

  function updateEntries(updater) {
    setEntries((prev) => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      persist(next);
      return next;
    });
  }

  function persistSites(next) {
    setSites(next);
    lsSet(SITES_KEY, next);
  }

  function addSiteIfNew(name) {
    const trimmed = (name || "").trim();
    if (!trimmed) return;
    if (!sites.includes(trimmed)) {
      persistSites([...sites, trimmed].sort((a, b) => a.localeCompare(b)));
    }
  }

  function saveRate(v) {
    const num = parseFloat(v);
    if (isNaN(num) || num <= 0) return;
    setFxRate(num);
    setRateEditorOpen(false);
    lsSet(RATE_KEY, num);
  }

  const sorted = useMemo(
    () => [...entries].sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0)),
    [entries]
  );

  function lineTotalsCHF(e) {
    const h = netHours(e.start, e.end, e.pausaMin);
    const base = h * (e.rate || 0);
    const total = base + (e.indennita || 0);
    return { hours: h, base, total };
  }

  const grand = useMemo(() => {
    let hours = 0, totalCHF = 0, indennitaCHF = 0;
    entries.forEach((e) => {
      const t = lineTotalsCHF(e);
      hours += t.hours;
      totalCHF += t.total;
      indennitaCHF += e.indennita || 0;
    });
    return { hours, totalCHF, indennitaCHF, totalEUR: totalCHF * fxRate };
  }, [entries, fxRate]);

  const perSite = useMemo(() => {
    const map = {};
    entries.forEach((e) => {
      const key = e.sito || "Senza sito";
      const h = netHours(e.start, e.end, e.pausaMin);
      map[key] = (map[key] || 0) + h;
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [entries]);

  function openNew() { setEditing(emptyEntry()); }
  function openEdit(e) { setEditing({ ...e, photos: e.photos || [] }); }

  function saveEditing() {
    addSiteIfNew(editing.sito);
    updateEntries((prev) => {
      const exists = prev.some((p) => p.id === editing.id);
      const next = exists ? prev.map((p) => (p.id === editing.id ? editing : p)) : [...prev, editing];
      return next;
    });
    setEditing(null);
  }

  function doDelete(id) {
    updateEntries((prev) => prev.filter((p) => p.id !== id));
    setConfirmDelete(null);
    setEditing(null);
  }

  async function buildPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const marginX = 48;
    let y = 50;

    try {
      const img = await loadImage(LOGO_SRC);
      const targetW = 130;
      const targetH = (img.naturalHeight / img.naturalWidth) * targetW;
      doc.addImage(LOGO_SRC, "PNG", marginX, y - 12, targetW, targetH);
      y += Math.max(targetH, 14) + 14;
    } catch (e) { y += 6; }

    doc.setFont("helvetica", "bold");
    doc.setFontSize(17);
    doc.setTextColor(15, 33, 56);
    doc.text("Registro turni — Gruppo Sicurezza", marginX, y);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);
    doc.setTextColor(91, 100, 114);
    y += 16;
    const periodo = sorted.length
      ? `Periodo: ${fmtDateLong(sorted[sorted.length - 1].date)} – ${fmtDateLong(sorted[0].date)}`
      : "Nessun turno registrato";
    doc.text(periodo, marginX, y);
    y += 13;
    doc.text(`Generato il ${new Date().toLocaleDateString("it-IT")} · Tasso CHF/EUR: ${fxRate.toFixed(4)}`, marginX, y);

    y += 12;
    doc.setDrawColor(27, 58, 92);
    doc.setLineWidth(1.4);
    doc.line(marginX, y, pageW - marginX, y);
    y += 26;

    const cols = [
      { key: "servizio", label: "Servizio / Sito", w: 130 },
      { key: "date", label: "Data", w: 54 },
      { key: "tipo", label: "Tipo", w: 58 },
      { key: "orario", label: "Orario", w: 54 },
      { key: "ore", label: "Ore", w: 32 },
      { key: "chf", label: "CHF", w: 56 },
      { key: "eur", label: "EUR", w: 56 },
    ];
    function drawHeader() {
      doc.setFont("helvetica", "bold");
      doc.setFontSize(8);
      doc.setTextColor(15, 33, 56);
      let x = marginX;
      cols.forEach((c) => { doc.text(c.label.toUpperCase(), x, y); x += c.w; });
      y += 6;
      doc.setDrawColor(185, 194, 204);
      doc.setLineWidth(0.6);
      doc.line(marginX, y, pageW - marginX, y);
      y += 14;
    }
    function ensureSpace(needed) {
      if (y + needed > pageH - 50) { doc.addPage(); y = 56; drawHeader(); }
    }
    drawHeader();

    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.setTextColor(30, 36, 48);

    for (const e of sorted) {
      ensureSpace(20);
      const t = lineTotalsCHF(e);
      let x = marginX;
      const servizioLabel = [e.nomeServizio, e.sito].filter(Boolean).join(" — ") || "—";
      const cells = [
        servizioLabel.slice(0, 28),
        fmtDateLong(e.date).replace(/^\w{3}\s/, ""),
        e.tipo,
        `${e.start}–${e.end}`,
        fmtHM(t.hours),
        fmtCHF(t.total),
        fmtEUR(t.total * fxRate),
      ];
      cells.forEach((val, i) => { doc.text(String(val), x, y); x += cols[i].w; });
      y += 13;

      if (e.note) {
        ensureSpace(11);
        doc.setFontSize(7.3);
        doc.setTextColor(120, 124, 132);
        doc.text(`Nota: ${e.note}`, marginX, y);
        doc.setFontSize(8);
        doc.setTextColor(30, 36, 48);
        y += 11;
      }

      if (e.photos && e.photos.length) {
        const thumbSize = 70;
        const gap = 8;
        ensureSpace(thumbSize + 10);
        let px = marginX;
        for (const photo of e.photos.slice(0, MAX_PHOTOS_PER_ENTRY)) {
          try {
            doc.addImage(photo, "JPEG", px, y, thumbSize, thumbSize);
            doc.setDrawColor(220, 225, 231);
            doc.rect(px, y, thumbSize, thumbSize);
          } catch (err) {}
          px += thumbSize + gap;
        }
        y += thumbSize + 10;
      }

      doc.setDrawColor(220, 225, 231);
      doc.setLineWidth(0.4);
      doc.line(marginX, y, pageW - marginX, y);
      y += 14;
    }

    ensureSpace(90);
    doc.setDrawColor(15, 33, 56);
    doc.setLineWidth(1);
    doc.line(marginX, y, pageW - marginX, y);
    y += 20;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(10.5);
    doc.setTextColor(30, 36, 48);
    doc.text("Totale ore", marginX, y);
    doc.text(fmtHM(grand.hours), marginX + 200, y);
    y += 18;
    doc.text("Totale indennità", marginX, y);
    doc.text(fmtCHF(grand.indennitaCHF), marginX + 200, y);
    y += 18;
    doc.setTextColor(27, 58, 92);
    doc.setFontSize(13);
    doc.text("Totale dovuto", marginX, y);
    doc.text(`${fmtCHF(grand.totalCHF)}  ·  ${fmtEUR(grand.totalEUR)}`, marginX + 200, y);

    y += 30;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(7.3);
    doc.setTextColor(150, 150, 150);
    doc.text("Documento generato automaticamente — Registro turni Gruppo Sicurezza.", marginX, y);

    return doc;
  }

  async function generatePDF() {
    setPdfBusy(true);
    try {
      const doc = await buildPDF();
      const fileName = `registro-turni_${todayISO()}.pdf`;
      const blob = doc.output("blob");
      const blobUrl = URL.createObjectURL(blob);
      window.open(blobUrl, "_blank");

      const subject = encodeURIComponent(`Registro turni — ${todayISO()}`);
      const body = encodeURIComponent(
        `Ciao,\n\nIn allegato il registro turni aggiornato al ${new Date().toLocaleDateString("it-IT")}.\n` +
        `Totale ore: ${fmtHM(grand.hours)}\nTotale dovuto: ${fmtCHF(grand.totalCHF)} (≈ ${fmtEUR(grand.totalEUR)})\n\n` +
        `Allega il PDF salvato dalla schermata di anteprima prima di inviare.\n\nGrazie.`
      );
      const mailtoUrl = `mailto:${DEST_EMAIL}?subject=${subject}&body=${body}`;
      setShareSheet({ fileName, blobUrl, mailtoUrl });
    } catch (err) {
      console.error(err);
      alert("Non è stato possibile generare il PDF. Riprova.");
    } finally {
      setPdfBusy(false);
    }
  }

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.ink, fontFamily: "'Inter', 'Segoe UI', system-ui, sans-serif" }}>
      <style>{`
        @media (prefers-reduced-motion: reduce) { * { animation:none !important; transition:none !important; } }
        .mono { font-family: 'JetBrains Mono','SF Mono', Menlo, monospace; }
        .row-card { transition: box-shadow .15s ease; }
        .row-card:hover { box-shadow: 0 2px 0 ${C.ruleStrong}; }
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
          outline: 2px solid ${C.navy}; outline-offset: 2px;
        }
        .primary-btn { background:${C.navy}; color:#fff; border:none; }
        .primary-btn:hover { background:${C.navyDark}; }
        .primary-btn:disabled { opacity:.5; cursor:default; }
        input, select, textarea { font-family: inherit; }
        ::-webkit-scrollbar { width:8px; }
        ::-webkit-scrollbar-thumb { background:${C.rule}; border-radius:4px; }
      `}</style>

      <header className="safe-top" style={{ background: C.navyDark, padding: "20px 18px 22px" }}>
        <div style={{ maxWidth: 760, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <img src={LOGO_SRC} alt="Gruppo Sicurezza" style={{ height: 30, objectFit: "contain", filter: "brightness(0) invert(1)" }} />
            <SaveDot state={saveState} />
          </div>
          <h1 style={{ margin: "16px 0 0", fontSize: 22, fontWeight: 700, color: "#fff", letterSpacing: "-0.01em" }}>
            Registro turni
          </h1>
          <div className="mono" style={{ fontSize: 10.5, letterSpacing: "0.1em", color: C.steel, marginTop: 3, textTransform: "uppercase" }}>
            Foglio di servizio personale
          </div>
        </div>
      </header>

      <div style={{ maxWidth: 760, margin: "16px auto 0", padding: "0 18px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.surface, border: `1px solid ${C.rule}`, borderRadius: 10, padding: "8px 12px" }}>
          <div className="mono" style={{ fontSize: 12, color: C.inkSoft }}>
            1 CHF = <span style={{ color: C.ink, fontWeight: 700 }}>{fxRate.toFixed(4)} EUR</span>
          </div>
          {!rateEditorOpen ? (
            <button onClick={() => setRateEditorOpen(true)} style={{ display: "flex", alignItems: "center", gap: 5, background: "transparent", border: `1px solid ${C.rule}`, borderRadius: 8, padding: "5px 9px", fontSize: 11, cursor: "pointer", color: C.ink }}>
              ⟳ Aggiorna tasso
            </button>
          ) : (
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <input autoFocus type="number" step="0.0001" value={rateInput} onChange={(e) => setRateInput(e.target.value)} style={{ width: 78, padding: "5px 7px", borderRadius: 6, border: `1px solid ${C.ruleStrong}`, fontSize: 12 }} />
              <button onClick={() => saveRate(rateInput)} className="primary-btn" style={{ borderRadius: 6, padding: "5px 10px", fontSize: 11, cursor: "pointer", fontWeight: 700 }}>OK</button>
              <button onClick={() => setRateEditorOpen(false)} style={{ background: "transparent", border: "none", cursor: "pointer", color: C.inkSoft }}>✕</button>
            </div>
          )}
        </div>
        <p style={{ fontSize: 11, color: C.inkSoft, marginTop: 6, lineHeight: 1.4 }}>
          Aggiorna il tasso manualmente quando ne controlli uno aggiornato (es. da Google).
        </p>
      </div>

      <div style={{ maxWidth: 760, margin: "14px auto 0", padding: "0 18px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
          <Stat label="Ore totali" value={fmtHM(grand.hours)} />
          <Stat label="Totale CHF" value={fmtCHF(grand.totalCHF)} accent />
          <Stat label="≈ Totale EUR" value={fmtEUR(grand.totalEUR)} />
        </div>
      </div>

      {perSite.length > 1 && (
        <div style={{ maxWidth: 760, margin: "14px auto 0", padding: "0 18px" }}>
          <div style={{ background: C.surface, border: `1px solid ${C.rule}`, borderRadius: 10, padding: "10px 12px" }}>
            <div className="mono" style={{ fontSize: 9.5, color: C.inkSoft, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>
              Ore per sito
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {perSite.map(([site, h]) => (
                <div key={site} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5 }}>
                  <span>📍 {site}</span>
                  <span className="mono" style={{ fontWeight: 700 }}>{fmtHM(h)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      <main style={{ maxWidth: 760, margin: "0 auto", padding: "20px 18px 100px" }}>
        {sorted.length === 0 ? (
          <div style={{ textAlign: "center", padding: "50px 16px", color: C.inkSoft, border: `1px dashed ${C.rule}`, borderRadius: 12 }}>
            Nessun turno registrato.<br />Aggiungi la prima voce per iniziare il registro.
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {sorted.map((e) => {
              const t = lineTotalsCHF(e);
              return (
                <button
                  key={e.id}
                  className="row-card"
                  onClick={() => openEdit(e)}
                  style={{ textAlign: "left", cursor: "pointer", background: C.surface, border: `1px solid ${C.rule}`, borderLeft: `3px solid ${C.navy}`, borderRadius: 8, padding: "12px 14px", width: "100%" }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <div>
                      <div style={{ fontSize: 13.5, fontWeight: 700 }}>{e.nomeServizio || "Servizio senza nome"}</div>
                      {e.sito && (
                        <div style={{ fontSize: 11, color: C.navyMid, marginTop: 2 }}>
                          📍 {e.sito}
                        </div>
                      )}
                      <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 2, textTransform: "capitalize" }}>
                        {fmtDateLong(e.date)} · {e.tipo}
                      </div>
                      <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 1 }}>
                        {e.start}–{e.end}{e.pausaMin ? ` · pausa ${e.pausaMin}'` : ""}
                      </div>
                    </div>
                    <span style={{ color: C.inkSoft }}>✎</span>
                  </div>

                  {e.photos && e.photos.length > 0 && (
                    <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                      {e.photos.slice(0, 4).map((p, i) => (
                        <div key={i} style={{ width: 36, height: 36, borderRadius: 6, overflow: "hidden", border: `1px solid ${C.rule}`, flexShrink: 0 }}>
                          <img src={p} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                        </div>
                      ))}
                    </div>
                  )}

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 8, paddingTop: 8, borderTop: `1px dashed ${C.rule}` }}>
                    <span className="mono" style={{ fontSize: 12, color: C.inkSoft }}>{fmtHM(t.hours)} di servizio</span>
                    <span className="mono" style={{ fontSize: 13, fontWeight: 700 }}>
                      {fmtCHF(t.total)} <span style={{ color: C.inkSoft, fontWeight: 400 }}>· {fmtEUR(t.total * fxRate)}</span>
                    </span>
                  </div>
                  {e.note && <div style={{ fontSize: 11, color: C.inkSoft, marginTop: 6, fontStyle: "italic" }}>{e.note}</div>}
                </button>
              );
            })}
          </div>
        )}
      </main>

      <div className="safe-bottom" style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.bg, borderTop: `1px solid ${C.rule}`, padding: "12px 18px", display: "flex", gap: 10, justifyContent: "center" }}>
        <div style={{ maxWidth: 760, width: "100%", display: "flex", gap: 10 }}>
          <button onClick={openNew} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, background: C.surface, border: `1px solid ${C.ruleStrong}`, borderRadius: 10, padding: "12px 0", fontWeight: 700, fontSize: 13.5, cursor: "pointer", color: C.ink }}>
            + Nuova voce
          </button>
          <button onClick={generatePDF} disabled={pdfBusy || sorted.length === 0} className="primary-btn" style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, borderRadius: 10, padding: "12px 0", fontWeight: 700, fontSize: 13.5, cursor: "pointer" }}>
            {pdfBusy ? "Generazione…" : "Genera PDF"}
          </button>
        </div>
      </div>

      {editing && (
        <EntryEditor
          entry={editing}
          isNew={!entries.some((p) => p.id === editing.id)}
          sites={sites}
          onChange={setEditing}
          onSave={saveEditing}
          onCancel={() => setEditing(null)}
          onAskDelete={() => setConfirmDelete(editing.id)}
          totals={lineTotalsCHF(editing)}
          fxRate={fxRate}
          onOpenPhoto={(src) => setLightbox(src)}
        />
      )}

      {confirmDelete && (
        <ConfirmDelete onCancel={() => setConfirmDelete(null)} onConfirm={() => doDelete(confirmDelete)} />
      )}

      {shareSheet && (
        <ShareSheet
          fileName={shareSheet.fileName}
          blobUrl={shareSheet.blobUrl}
          mailtoUrl={shareSheet.mailtoUrl}
          destEmail={DEST_EMAIL}
          onClose={() => setShareSheet(null)}
        />
      )}

      {lightbox && (
        <div onClick={() => setLightbox(null)} style={{ position: "fixed", inset: 0, background: "rgba(15,33,56,0.9)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <img src={lightbox} alt="" style={{ maxWidth: "100%", maxHeight: "100%", borderRadius: 8 }} />
        </div>
      )}
    </div>
  );
}

function SaveDot({ state }) {
  if (state === "idle") return null;
  const label = state === "saving" ? "Salvataggio…" : state === "saved" ? "Salvato" : "Errore";
  return <span className="mono" style={{ fontSize: 10, color: "#9FB3C8" }}>{label}</span>;
}

function Stat({ label, value, accent }) {
  return (
    <div style={{ background: accent ? C.accentSoft : "#fff", border: `1px solid ${accent ? "#1B3A5C33" : C.rule}`, borderRadius: 10, padding: "10px 12px" }}>
      <div className="mono" style={{ fontSize: 9.5, color: accent ? C.navy : C.inkSoft, textTransform: "uppercase", letterSpacing: "0.06em" }}>{label}</div>
      <div style={{ fontSize: 17, fontWeight: 700, marginTop: 2, color: accent ? C.navy : C.ink }}>{value}</div>
    </div>
  );
}

function EntryEditor({ entry, isNew, sites, onChange, onSave, onCancel, onAskDelete, totals, fxRate, onOpenPhoto }) {
  const [siteDropdownOpen, setSiteDropdownOpen] = useState(false);
  const [photoBusy, setPhotoBusy] = useState(false);
  const fileInputRef = useRef(null);

  function set(field, value) { onChange({ ...entry, [field]: value }); }

  async function handlePhotoFiles(fileList) {
    const files = Array.from(fileList || []).slice(0, MAX_PHOTOS_PER_ENTRY - (entry.photos?.length || 0));
    if (!files.length) return;
    setPhotoBusy(true);
    try {
      const compressed = await Promise.all(files.map((f) => compressImageFile(f)));
      onChange({ ...entry, photos: [...(entry.photos || []), ...compressed] });
    } catch (e) {
      alert("Non è stato possibile caricare una delle foto.");
    } finally {
      setPhotoBusy(false);
    }
  }

  function removePhoto(idx) {
    const next = [...entry.photos];
    next.splice(idx, 1);
    set("photos", next);
  }

  const photosCount = entry.photos?.length || 0;
  const canAddMore = photosCount < MAX_PHOTOS_PER_ENTRY;

  return (
    <Overlay onClose={onCancel}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
        <div className="mono" style={{ fontSize: 10, letterSpacing: "0.1em", color: C.navy, fontWeight: 700 }}>
          {isNew ? "NUOVA VOCE" : "MODIFICA VOCE"}
        </div>
        <button onClick={onCancel} aria-label="Chiudi" style={{ background: "transparent", border: "none", cursor: "pointer", color: C.ink, fontSize: 18 }}>✕</button>
      </div>

      <Field label="Nome del servizio">
        <input
          type="text"
          value={entry.nomeServizio}
          onChange={(e) => set("nomeServizio", e.target.value)}
          placeholder="Es. Notturno fiera, Scorta contanti…"
          style={inputStyle}
          autoFocus
        />
      </Field>

      <div style={{ marginTop: 12, position: "relative" }}>
        <Field label="Sito / cliente">
          <div style={{ display: "flex", gap: 6 }}>
            <input
              type="text"
              value={entry.sito}
              onChange={(e) => set("sito", e.target.value)}
              onFocus={() => setSiteDropdownOpen(true)}
              placeholder="Es. Centro commerciale Lugano…"
              style={{ ...inputStyle, flex: 1 }}
            />
            {sites.length > 0 && (
              <button
                type="button"
                onClick={() => setSiteDropdownOpen((v) => !v)}
                style={{ border: `1px solid ${C.rule}`, background: "#fff", borderRadius: 8, padding: "0 10px", cursor: "pointer", color: C.inkSoft }}
                aria-label="Mostra siti salvati"
              >
                ▾
              </button>
            )}
          </div>
          {siteDropdownOpen && sites.length > 0 && (
            <div style={{ marginTop: 4, background: "#fff", border: `1px solid ${C.rule}`, borderRadius: 8, maxHeight: 160, overflowY: "auto" }}>
              {sites
                .filter((s) => s.toLowerCase().includes((entry.sito || "").toLowerCase()))
                .map((s) => (
                  <div
                    key={s}
                    onClick={() => { set("sito", s); setSiteDropdownOpen(false); }}
                    style={{ padding: "8px 10px", fontSize: 13, cursor: "pointer", borderBottom: `1px solid ${C.rule}` }}
                  >
                    {s}
                  </div>
                ))}
            </div>
          )}
        </Field>
      </div>

      <div style={{ marginTop: 12 }}>
        <Field label="Data">
          <input type="date" value={entry.date} onChange={(e) => set("date", e.target.value)} style={inputStyle} />
        </Field>
      </div>

      <div style={{ marginTop: 12 }}>
        <Field label="Tipo di servizio">
          <select value={entry.tipo} onChange={(e) => set("tipo", e.target.value)} style={inputStyle}>
            {TIPI_SERVIZIO.map((t) => <option key={t} value={t}>{t}</option>)}
          </select>
        </Field>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 12 }}>
        <Field label="Ora inizio">
          <input type="time" value={entry.start} onChange={(e) => set("start", e.target.value)} style={inputStyle} />
        </Field>
        <Field label="Ora fine">
          <input type="time" value={entry.end} onChange={(e) => set("end", e.target.value)} style={inputStyle} />
        </Field>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 12 }}>
        <Field label="Pausa (minuti)">
          <input type="number" min="0" step="5" value={entry.pausaMin} onChange={(e) => set("pausaMin", parseInt(e.target.value) || 0)} style={inputStyle} />
        </Field>
        <Field label="Paga oraria (CHF/h)">
          <input type="number" min="0" step="0.5" value={entry.rate} onChange={(e) => set("rate", parseFloat(e.target.value) || 0)} style={inputStyle} />
        </Field>
      </div>

      <div style={{ marginTop: 12 }}>
        <Field label="Indennità fissa (CHF)">
          <input type="number" min="0" step="0.5" value={entry.indennita} onChange={(e) => set("indennita", parseFloat(e.target.value) || 0)} style={inputStyle} />
        </Field>
      </div>

      <div style={{ marginTop: 12 }}>
        <Field label="Note (opzionale)">
          <textarea rows={2} value={entry.note} onChange={(e) => set("note", e.target.value)} placeholder="Es. sostituzione collega, sede diversa…" style={{ ...inputStyle, resize: "vertical" }} />
        </Field>
      </div>

      <div style={{ marginTop: 12 }}>
        <Field label={`Foto allegate (${photosCount}/${MAX_PHOTOS_PER_ENTRY})`}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {(entry.photos || []).map((p, i) => (
              <div key={i} style={{ position: "relative", width: 64, height: 64, borderRadius: 8, overflow: "hidden", border: `1px solid ${C.rule}` }}>
                <img src={p} alt="" onClick={() => onOpenPhoto(p)} style={{ width: "100%", height: "100%", objectFit: "cover", cursor: "pointer" }} />
                <button
                  onClick={() => removePhoto(i)}
                  aria-label="Rimuovi foto"
                  style={{ position: "absolute", top: -6, right: -6, background: C.warn, color: "#fff", border: "none", borderRadius: 999, width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 11 }}
                >✕</button>
              </div>
            ))}
            {canAddMore && (
              <button
                type="button"
                onClick={() => fileInputRef.current?.click()}
                disabled={photoBusy}
                style={{ width: 64, height: 64, borderRadius: 8, border: `1px dashed ${C.ruleStrong}`, background: "#fff", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2, cursor: "pointer", color: C.inkSoft }}
              >
                <span style={{ fontSize: 18 }}>📷</span>
                <span style={{ fontSize: 9 }}>{photoBusy ? "…" : "Aggiungi"}</span>
              </button>
            )}
          </div>
          <input
            ref={fileInputRef}
            type="file"
            accept="image/*"
            capture="environment"
            multiple
            style={{ display: "none" }}
            onChange={(e) => { handlePhotoFiles(e.target.files); e.target.value = ""; }}
          />
        </Field>
      </div>

      <div style={{ marginTop: 16, background: C.accentSoft, border: `1px solid #1B3A5C33`, borderRadius: 10, padding: "10px 12px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5 }}>
          <span style={{ color: C.inkSoft }}>Ore nette</span>
          <span className="mono" style={{ fontWeight: 700 }}>{fmtHM(totals.hours)}</span>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginTop: 4 }}>
          <span style={{ color: C.inkSoft }}>Totale</span>
          <span className="mono" style={{ fontWeight: 700, color: C.navy }}>
            {fmtCHF(totals.total)} · {fmtEUR(totals.total * fxRate)}
          </span>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
        {!isNew && (
          <button onClick={onAskDelete} style={{ border: `1px solid ${C.warn}`, color: C.warn, background: "transparent", borderRadius: 10, padding: "10px 14px", cursor: "pointer" }}>🗑</button>
        )}
        <button onClick={onSave} className="primary-btn" style={{ flex: 1, borderRadius: 10, padding: "10px 0", fontWeight: 700, cursor: "pointer" }}>
          Salva voce
        </button>
      </div>
    </Overlay>
  );
}

function ConfirmDelete({ onCancel, onConfirm }) {
  return (
    <Overlay onClose={onCancel}>
      <p style={{ fontSize: 14, marginBottom: 16 }}>Eliminare definitivamente questa voce dal registro?</p>
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={onCancel} style={{ flex: 1, border: `1px solid ${C.rule}`, background: "transparent", borderRadius: 10, padding: "10px 0", cursor: "pointer" }}>Annulla</button>
        <button onClick={onConfirm} className="primary-btn" style={{ flex: 1, borderRadius: 10, padding: "10px 0", fontWeight: 700, cursor: "pointer", background: C.warn }}>Elimina</button>
      </div>
    </Overlay>
  );
}

function ShareSheet({ fileName, blobUrl, mailtoUrl, destEmail, onClose }) {
  return (
    <Overlay onClose={onClose}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <div style={{ background: "#1B3A5C18", borderRadius: 999, padding: 8, display: "flex" }}>✓</div>
        <div>
          <div style={{ fontWeight: 700, fontSize: 15 }}>PDF pronto</div>
          <div style={{ fontSize: 12, color: C.inkSoft }}>{fileName}</div>
        </div>
      </div>

      <p style={{ fontSize: 13, color: C.inkSoft, lineHeight: 1.5, marginBottom: 16 }}>
        Il PDF si è aperto in una nuova schermata: da lì usa <strong style={{ color: C.ink }}>Condividi</strong> o <strong style={{ color: C.ink }}>Salva</strong> per metterlo tra i tuoi file. Poi, per inviarlo a <strong style={{ color: C.ink }}>{destEmail}</strong>, apri l'email già pronta e allegalo.
      </p>

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        <a
          href={blobUrl}
          target="_blank"
          rel="noopener noreferrer"
          style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, border: `1px solid ${C.ruleStrong}`, background: "#fff", borderRadius: 10, padding: "12px 0", fontWeight: 700, textDecoration: "none", fontSize: 14, color: C.ink }}
        >
          Riapri il PDF
        </a>
        <a
          href={mailtoUrl}
          className="primary-btn"
          style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, borderRadius: 10, padding: "12px 0", fontWeight: 700, textDecoration: "none", fontSize: 14 }}
        >
          Apri email pronta
        </a>
        <button
          onClick={onClose}
          style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, border: "none", background: "transparent", borderRadius: 10, padding: "10px 0", fontWeight: 600, cursor: "pointer", fontSize: 13, color: C.inkSoft }}
        >
          Chiudi
        </button>
      </div>
    </Overlay>
  );
}

function Field({ label, children }) {
  return (
    <label style={{ display: "block", fontSize: 11.5, color: C.inkSoft, fontWeight: 600 }}>
      {label}
      <div style={{ marginTop: 4 }}>{children}</div>
    </label>
  );
}

const inputStyle = {
  width: "100%",
  padding: "9px 10px",
  borderRadius: 8,
  border: `1px solid ${C.rule}`,
  fontSize: 14,
  color: C.ink,
  background: "#fff",
  boxSizing: "border-box",
};

function Overlay({ children, onClose }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(15,33,56,0.5)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.bg, borderRadius: "16px 16px 0 0", padding: 20, width: "100%", maxWidth: 480, maxHeight: "88vh", overflowY: "auto", boxShadow: "0 -8px 30px rgba(0,0,0,0.25)" }}>
        {children}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
